services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: homemed
      POSTGRES_USER: homemed
      POSTGRES_PASSWORD: homemed_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U homemed']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://homemed:homemed_dev@postgres:5432/homemed
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: https://line5566.duckdns.org
      PORT: 8085
    ports:
      - '8085:8085'
    volumes:
      - uploads:/app/apps/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/src/main"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    env_file: .env
    environment:
      PORT: 8084
      NODE_ENV: production
      NEXTAUTH_URL: https://line5566.duckdns.org
      API_URL: http://backend:8085
    ports:
      - '8084:8084'
    depends_on:
      - backend

  liff:
    build:
      context: .
      dockerfile: apps/liff/Dockerfile
      args:
        VITE_API_URL: https://line5566.duckdns.org/api
        VITE_LIFF_ID: ${VITE_LIFF_ID}
    expose:
      - '80'
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  uploads:
