services:
  postgres_hl:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: homemed
      POSTGRES_USER: homemed
      POSTGRES_PASSWORD: homemed_dev
    command: -p 5433
    ports:
      - '5433:5433'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U homemed -p 5433']
      interval: 5s
      timeout: 5s
      retries: 10

  redis_hl:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend_hl:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://homemed:homemed_dev@postgres_hl:5433/homemed
      REDIS_URL: redis://redis_hl:6379
      FRONTEND_URL: https://poc-hl.autratech.org
      PORT: 8085
    ports:
      - '8085:8085'
    volumes:
      - uploads:/app/apps/backend/uploads
    depends_on:
      postgres_hl:
        condition: service_healthy
      redis_hl:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/src/main"

  frontend_hl:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    env_file: .env
    environment:
      PORT: 8084
      NODE_ENV: production
      NEXTAUTH_URL: https://poc-hl.autratech.org
      API_URL: http://backend_hl:8085
    ports:
      - '8084:8084'
    depends_on:
      - backend_hl

  liff_hl:
    build:
      context: .
      dockerfile: apps/liff/Dockerfile
      args:
        VITE_API_URL: https://poc-hl.autratech.org/api
        VITE_LIFF_ID: ${VITE_LIFF_ID}
    expose:
      - '80'
    depends_on:
      - backend_hl
  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'
      - '8443:443'
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/acme-challenge:/var/www/acme-challenge:ro
    depends_on:
      - frontend_hl
      - backend_hl
      - liff_hl
volumes:
  pgdata:
  redisdata:
  uploads:
