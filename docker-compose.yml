services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: homemed
      POSTGRES_USER: homemed
      POSTGRES_PASSWORD: homemed_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U homemed']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://homemed:homemed_dev@postgres:5432/homemed
      REDIS_URL: redis://redis:6379
    expose:
      - '3001'
    volumes:
      - uploads:/app/apps/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/src/main"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    env_file: .env
    environment:
      PORT: 3000
      NODE_ENV: production
      NEXTAUTH_URL: https://localhost
      API_URL: http://backend:3001
    expose:
      - '3000'
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  redisdata:
  uploads:
